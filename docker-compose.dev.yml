services:
  vault:
    image: hashicorp/vault:latest
    container_name: tfg-vault-dev
    user: "0:0"
    ports: ["8200:8200"]
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=tfg-dev-root-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add: [IPC_LOCK, SETFCAP]
    command: server -dev

  vault-init:
    image: alpine
    container_name: tfg-vault-init
    depends_on:
      - vault
    command: >
      sh -c "
        apk add --no-cache curl &&
        sleep 3 &&
        curl -H 'X-Vault-Token: tfg-dev-root-token' -X POST -d '{\"data\":{\"privateKey\":\"0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80\"}}' http://vault:8200/v1/secret/data/blockchain &&
        echo 'Clave inyectada con exito'
      "

  hardhat:
    image: node:20-alpine
    container_name: tfg-hardhat-node
    working_dir: /app
    volumes:
      - ./hardhat:/app
    ports: ["8545:8545"]
    command: >
      sh -c "npm install && npx hardhat node --hostname 0.0.0.0"

  hardhat-deploy:
    image: node:20-alpine
    container_name: tfg-hardhat-deploy
    working_dir: /app
    volumes:
      - ./hardhat:/app
    depends_on:
      - hardhat
    network_mode: "service:hardhat"
    command: >
      sh -c "npm install && sleep 5 && npx hardhat run scripts/deploy.ts --network localhost"

  redis:
    image: redis:alpine
    container_name: tfg-redis
    ports: ["6379:6379"]

  backend:
    build: .
    container_name: tfg-backend
    ports: ["3000:3000"]
    env_file:
      - .env
    depends_on:
      vault-init:
        condition: service_completed_successfully
      hardhat-deploy:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      - PORT=3000
      - BLOCKCHAIN_RPC_URL=http://hardhat:8545
      - REGISTRO_CONTRATO_ADDRESS=0x5FbDB2315678afecb367f032d93F642f64180aa3
      - VAULT_ENDPOINT=http://vault:8200
      - VAULT_TOKEN=tfg-dev-root-token
      - REDIS_HOST=redis
