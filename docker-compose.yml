services:
  nginx:
    image: nginx:alpine
    container_name: tfg-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx:/etc/nginx/certs:ro
    depends_on:
      - backend
    entrypoint:
      - sh
      - -c
      - |
        apk add --no-cache openssl
        if [ ! -f /etc/nginx/certs/server.crt ]; then
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /etc/nginx/certs/server.key \
            -out    /etc/nginx/certs/server.crt \
            -subj   '/CN=localhost'
        fi
        exec nginx -g 'daemon off;'

  redis:
    image: redis:alpine
    container_name: tfg-redis-prod
    restart: unless-stopped
    volumes:
      - redis_data:/data

  vault:
    image: hashicorp/vault:latest
    container_name: tfg-vault-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:8200:8200"
    entrypoint: ["vault"]
    command: server -dev
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=tfg-dev-root-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - VAULT_DISABLE_MLOCK=true
    volumes:
      - vault_data:/vault/file

  backend:
    build: .
    container_name: tfg-backend-prod
    restart: unless-stopped
    depends_on:
      - redis
      - vault
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=${PORT}
      - REDIS_HOST=redis
      - VAULT_ENDPOINT=${VAULT_ENDPOINT}
      - VAULT_TOKEN=${VAULT_TOKEN}
      - BLOCKCHAIN_RPC_URL=${BLOCKCHAIN_RPC_URL}
      - REGISTRO_CONTRATO_ADDRESS=${REGISTRO_CONTRATO_ADDRESS}

volumes:
  redis_data:
  vault_data:
  nginx_certs: