services:
  redis:
    image: redis/redis-stack-server:latest   
    container_name: tfg-redis-load
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  vault:
    image: hashicorp/vault:latest
    container_name: tfg-vault-load
    entrypoint: ["vault"]         
    command: server -dev
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=test-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - VAULT_DISABLE_MLOCK=true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build: .
    container_name: tfg-backend-load
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BLOCKCHAIN_MOCK_MODE=true
      - VAULT_ENDPOINT=http://vault:8200
      - VAULT_TOKEN=test-token
    depends_on:
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy   
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          node -e "
            require('http')
              .get('http://localhost:3000/health', r => process.exit(r.statusCode < 500 ? 0 : 1))
              .on('error', () => process.exit(1))
          "
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  k6:
    image: grafana/k6:latest
    container_name: tfg-k6-load
    env_file: .env
    environment:
      - BASE_URL=http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./load-tests:/scripts:ro        
      - ./load-tests/reports:/reports    
    command: run /scripts/${K6_SCRIPT:-carga-sostenida.js}