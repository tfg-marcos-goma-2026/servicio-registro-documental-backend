services:
  redis:
    image: redis:alpine
    container_name: tfg-redis-load
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    container_name: tfg-backend-load
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BLOCKCHAIN_MOCK_MODE=true
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          node -e "
            require('http')
              .get('http://localhost:3000/health', r => process.exit(r.statusCode < 500 ? 0 : 1))
              .on('error', () => process.exit(1))
          "
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  k6:
    image: grafana/k6:latest
    container_name: tfg-k6-load
    env_file: .env
    environment:
      - BASE_URL=http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./load-tests:/scripts:ro
    command: run /scripts/${K6_SCRIPT:-carga-sostenida.js}